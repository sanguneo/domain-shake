name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure modern npm for trusted publishing
        run: |
          npm i -g npm@latest
          npm --version

      - name: Validate release tag matches package version
        if: ${{ github.event_name == 'release' }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag ($TAG) does not match package.json version (v$PKG_VERSION)"
            exit 1
          fi

      - name: Publish (Trusted Publishing / OIDC)
        run: npm publish --provenance --access public
